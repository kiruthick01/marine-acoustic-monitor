<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Each duty-cycle wake window produces a raw audio file and a structured SQLite row, with the row referencing the audio filename. Both live in local storage on the Pi, retrieved in bulk during maintenance visits. A future central time-series database is planned for multi-buoy scaling, not built yet.</desc>
