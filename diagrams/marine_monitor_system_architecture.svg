<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Hydrophone, environmental sensors, and IMU feed into a Raspberry Pi edge compute node. The Pi splits output into a low-bandwidth telemetry link (to a remote dashboard for alerts) and local storage (retrieved during maintenance for bulk offline analysis).</desc>
